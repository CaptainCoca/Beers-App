<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Le Maître Houblon</title>
    <link rel="stylesheet" href="/Beers-App/inscription-connexion\connexion\connexion.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
</head>
<body>
    <a href="/Beers-App/index.html" class="back-home">
        <span> Retour à l'accueil </span>
    </a>
    <div class="container">
        <div class="columns is-centered">
            <div class="column is-4">
                <div class="login-card">
                    <h1 class="title has-text-centered">Connexion</h1>
                    
                    <form action="/Beers-App/inscription-connexion\connexion\login_process.php" method="POST">
                        <div class="field">
                            <label class="label">Adresse Mail :</label>
                            <div class="control">
                                <input class="input" type="email" name="email" placeholder="exemple@mail.com" required>
                            </div>
                        </div>
                    
                        <div class="field">
                            <label class="label">Mot de passe :</label>
                            <div class="control">
                                <input class="input" type="password" name="password" placeholder="********" required>
                            </div>
                        </div>
                    
                        <button type="submit" class="button is-dark is-fullwidth mt-5">Se connecter</button>
                    </form>

                    <p class="has-text-centered mt-4">
                        <a href="/Beers-App/inscription-connexion/inscription/inscription.html" class="is-size-6">S'inscrire</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
