<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Le Maître Houblon</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link rel="stylesheet" href="/Beers-App/inscription-connexion\inscription\inscription.css"> </head>
<body>
    <a href="/Beers-App/index.html" class="back-home">
        <span> Retour à l'accueil </span>
    </a>
    <div class="app-container is-flex is-align-items-center">
        <div class="container">
            <div class="columns is-centered">
                <div class="column is-4">
                    <div class="wireframe-box is-block" style="height: auto;">
                        <h1 class="title has-text-centered mb-5">Créer un compte</h1>
                        
                        <form action="signup_process.php" method="POST">
                            <div class="field">
                                <label class="label">Pseudo</label>
                                <div class="control">
                                    <input class="input" type="text" name="pseudo" placeholder="Ton nom de brasseur" required>
                                </div>
                            </div>

                            <div class="field">
                                <label class="label">Adresse Mail</label>
                                <div class="control">
                                    <input class="input" type="email" name="email" placeholder="exemple@mail.com" required>
                                </div>
                            </div>

                            <div class="field">
                                <label class="label">Mot de passe</label>
                                <div class="control">
                                    <input class="input" type="password" name="password" placeholder="********" required>
                                </div>
                            </div>

                            <button type="submit" class="button is-dark is-fullwidth mt-5">S'inscrire</button>
                        </form>
                        
                        <p class="has-text-centered mt-4">
                            <a href="/Beers-App/inscription-connexion/connexion/connexion.html" class="is-size-6">Se connecter</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
