<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste de vos bières</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e293b;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        h1 {
            font-size: 2rem;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background-color: #3b82f6;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #2563eb;
        }

        /* Petite animation discrète */
        .wrench {
            display: inline-block;
            animation: move 2.5s infinite ease-in-out;
        }

        @keyframes move {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-15deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="icon wrench">🛠️</span>
        <h1>Page en construction</h1>
        <p>Désolé ! Nous peaufinons encore le contenu de <strong>cette page</strong>. Elle sera prête très prochainement.</p>
        
        <a href="/" class="btn">Retour</a>
    </div>

</body>
</html>
